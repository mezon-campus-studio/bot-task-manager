name: Run Deploy Adapter
description: Execute a provider-specific deploy adapter script without coupling workflows to one platform.

inputs:
  script-path:
    description: Path to the deploy adapter script.
    required: true
  image-ref:
    description: Image reference produced by the build job.
    required: true
  environment-name:
    description: Deployment environment name.
    required: true
  working-directory:
    description: Optional working directory for the script.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Run deploy adapter
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        IMAGE_REF: ${{ inputs.image-ref }}
        DEPLOY_ENVIRONMENT: ${{ inputs.environment-name }}
      run: |
        set -euo pipefail

        if [ ! -f "${{ inputs.script-path }}" ]; then
          echo "Deploy adapter not found: ${{ inputs.script-path }}"
          echo "Create the adapter script to enable infrastructure-specific delivery."
          exit 1
        fi

        bash "${{ inputs.script-path }}"
