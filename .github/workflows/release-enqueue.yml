name: Release Enqueue

on:
  push:
    branches:
      - develop
  workflow_dispatch:
    inputs:
      pr_number:
        description: Merged PR number to include in the release PR body.
        required: false
        type: number

concurrency:
  group: sample-campus-release-queue
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

env:
  RELEASE_SOURCE_BRANCH: develop
  RELEASE_TARGET_BRANCH: main
  RELEASE_BRANCH_PREFIX: release
  RELEASE_TIMEZONE: Asia/Ho_Chi_Minh

jobs:
  enqueue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update release PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
          PR_NUMBER: ${{ github.event_name == 'workflow_dispatch' && inputs.pr_number || '' }}
        run: bash .github/scripts/release/enqueue.sh
