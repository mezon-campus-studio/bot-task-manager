name: Sample Campus Deploy

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment name.
        required: true
        default: dev
        type: choice
        options:
          - dev
          - prod
      push_image:
        description: Push image to Artifact Registry.
        required: true
        default: true
        type: boolean
      run_deploy:
        description: Execute the deploy adapter after publishing the image.
        required: true
        default: false
        type: boolean

concurrency:
  group: sample-campus-deploy-${{ github.event_name == 'push' && github.ref_name || inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  DEPLOY_ADAPTER_PATH: .github/scripts/deploy-sample-campus.sh

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      push-image: ${{ steps.resolve.outputs.push-image }}
      run-deploy: ${{ steps.resolve.outputs.run-deploy }}
    steps:
      - name: Resolve deployment settings
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            case "${GITHUB_REF_NAME}" in
              develop)
                environment="dev"
                ;;
              main)
                environment="prod"
                ;;
              *)
                echo "Unsupported push branch: ${GITHUB_REF_NAME}"
                exit 1
                ;;
            esac
            push_image="true"
            run_deploy="true"
          else
            environment="${{ inputs.environment }}"
            push_image="${{ inputs.push_image }}"
            run_deploy="${{ inputs.run_deploy }}"
          fi

          {
            echo "environment=${environment}"
            echo "push-image=${push_image}"
            echo "run-deploy=${run_deploy}"
          } >> "$GITHUB_OUTPUT"

  build-image:
    runs-on: ubuntu-latest
    needs: resolve
    environment: ${{ needs.resolve.outputs.environment }}
    outputs:
      image-ref: ${{ steps.build.outputs.image-ref }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy input combination
        if: needs.resolve.outputs.run-deploy == 'true' && needs.resolve.outputs.push-image != 'true'
        shell: bash
        run: |
          echo "run_deploy=true requires push_image=true so Cloud Run can pull the image."
          exit 1

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "value=${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${GAR_REPOSITORY}/sample-campus" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        if: needs.resolve.outputs.push-image == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Setup gcloud
        if: needs.resolve.outputs.push-image == 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        if: needs.resolve.outputs.push-image == 'true'
        shell: bash
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Build image
        id: build
        uses: ./.github/actions/build-sample-campus-image
        with:
          image: ${{ steps.image.outputs.value }}
          push: ${{ needs.resolve.outputs.push-image }}
          tags: |
            ${{ steps.image.outputs.value }}:${{ needs.resolve.outputs.environment }}

  deploy:
    runs-on: ubuntu-latest
    needs:
      - resolve
      - build-image
    if: needs.resolve.outputs.run-deploy == 'true'
    environment: ${{ needs.resolve.outputs.environment }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      CLOUD_RUN_JOB: ${{ vars.CLOUD_RUN_JOB }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
      OAUTH_URL: ${{ vars.OAUTH_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run deploy adapter
        uses: ./.github/actions/run-deploy-adapter
        with:
          script-path: ${{ env.DEPLOY_ADAPTER_PATH }}
          image-ref: ${{ needs.build-image.outputs.image-ref }}
          environment-name: ${{ needs.resolve.outputs.environment }}
