name: Sample Campus Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment name.
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production
      push_image:
        description: Push image to GHCR.
        required: true
        default: true
        type: boolean
      run_deploy:
        description: Execute the deploy adapter after publishing the image.
        required: true
        default: false
        type: boolean

concurrency:
  group: sample-campus-deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  DEPLOY_ADAPTER_PATH: .github/scripts/deploy-sample-campus.sh

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.build.outputs.image-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "value=$(echo 'ghcr.io/${{ github.repository_owner }}/sample-campus' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: inputs.push_image
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: ./.github/actions/build-sample-campus-image
        with:
          image: ${{ steps.image.outputs.value }}
          push: ${{ inputs.push_image }}
          tags: |
            ${{ steps.image.outputs.value }}:${{ inputs.environment }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    if: inputs.run_deploy
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run deploy adapter
        uses: ./.github/actions/run-deploy-adapter
        with:
          script-path: ${{ env.DEPLOY_ADAPTER_PATH }}
          image-ref: ${{ needs.build-image.outputs.image-ref }}
          environment-name: ${{ inputs.environment }}
