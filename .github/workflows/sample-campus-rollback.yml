name: Sample Campus Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment name.
        required: true
        default: prod
        type: choice
        options:
          - dev
          - prod
      rollback_target:
        description: Cloud Run revision name to route traffic back to.
        required: true
        type: string
      reason:
        description: Why the rollback is being triggered.
        required: false
        default: ''
        type: string

concurrency:
  group: sample-campus-rollback-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  ROLLBACK_ADAPTER_PATH: .github/scripts/rollback-sample-campus.sh

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      GCP_WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Run rollback adapter
        uses: ./.github/actions/run-rollback-adapter
        with:
          script-path: ${{ env.ROLLBACK_ADAPTER_PATH }}
          rollback-target: ${{ inputs.rollback_target }}
          environment-name: ${{ inputs.environment }}
          reason: ${{ inputs.reason }}
