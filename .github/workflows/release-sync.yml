name: Release Sync

on:
  workflow_dispatch:

concurrency:
  group: sample-campus-release-queue
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  RELEASE_SOURCE_BRANCH: develop
  RELEASE_TARGET_BRANCH: main
  RELEASE_BRANCH_PREFIX: release
  RELEASE_TIMEZONE: Asia/Ho_Chi_Minh

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_GH_TOKEN }}

      - name: Sync active release PR body
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
        run: bash .github/scripts/release/sync.sh
