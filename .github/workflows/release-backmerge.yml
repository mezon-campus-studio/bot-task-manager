name: Release Acknowledge History

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Release Promote
    types:
      - completed

concurrency:
  group: sample-campus-release-backmerge
  cancel-in-progress: false

permissions:
  contents: write

env:
  RELEASE_SOURCE_BRANCH: develop
  RELEASE_TARGET_BRANCH: main
  RELEASE_BRANCH_PREFIX: release
  RELEASE_TIMEZONE: Asia/Ho_Chi_Minh

jobs:
  acknowledge-history:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_GH_TOKEN }}

      - name: Acknowledge released history on develop
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.BOT_GH_TOKEN }}
        run: bash .github/scripts/release/backmerge.sh
