name: Sample Campus CI

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: sample-campus-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  SAMPLE_CAMPUS_BOOTSTRAP_DB: sample-campus-database-1-1

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-sample-campus

      - name: Verify
        uses: ./.github/actions/verify-sample-campus

  test:
    runs-on: ubuntu-latest
    needs: verify
    services:
      postgres:
        image: postgres:15.5-alpine
        env:
          POSTGRES_DB: sample-campus-database-1-1
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sample-campus-database-1-1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project
        uses: ./.github/actions/setup-sample-campus

      - name: Run test suite
        uses: ./.github/actions/test-sample-campus
        with:
          db-host: 127.0.0.1
          db-port: "5432"
          db-username: postgres
          db-password: postgres
          db-database: ${{ env.SAMPLE_CAMPUS_BOOTSTRAP_DB }}

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sample-campus-junit
          path: .cache/test/junit.xml
          if-no-files-found: ignore

  docker-smoke:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "value=$(echo 'ghcr.io/${{ github.repository_owner }}/sample-campus' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        uses: ./.github/actions/build-sample-campus-image
        with:
          image: ${{ steps.image.outputs.value }}
          push: "false"
